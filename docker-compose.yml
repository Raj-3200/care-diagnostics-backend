version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: care-diagnostics-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: care_user
      POSTGRES_PASSWORD: care_pass
      POSTGRES_DB: care_diagnostics
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U care_user -d care_diagnostics']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: care-diagnostics-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
